<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blue Form</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #1e88e5;
        font-family: Arial, sans-serif;
    }

    .form {
        background: white;
        padding: 30px;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 300px;
    }

    input {
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
    }
</style>
</head>
<body>
    <div class="form">
        <input type="text" placeholder="First Input">
        <input type="password" placeholder="Second Input">
        <input type="text" placeholder="Third Input">
    </div>
</body>
</html>
