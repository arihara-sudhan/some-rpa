<!DOCTYPE html>
<html>
<head>
  <title>40 Input Boxes</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      width: 90%;
      max-width: 1000px;
    }

    input {
      background: #1a1a1a;
      color: white;
      border: 1px solid white;
      padding: 12px;
      border-radius: 6px;
      outline: none;
      font-size: 16px;
    }

    input::placeholder {
      color: #aaa;
    }
  </style>
</head>

<body>

  <div class="container">

    <script>
      for (let i = 1; i <= 40; i++) {
        document.write(`
          <input 
            type="text" 
            id="${i}" 
            placeholder="Input ${i}"
          >
        `);
      }
    </script>

  </div>

</body>
</html>
