<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Green Input</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f2027, #203a1f, #2ecc71);
      font-family: Arial, sans-serif;
      color: #a8ffb0;
    }

    .box {
      background: rgba(0, 0, 0, 0.4);
      padding: 20px 25px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
      text-align: center;
    }

    .id-edit {
      font-size: 12px;
      margin-bottom: 8px;
      opacity: 0.8;
      cursor: pointer;
    }

    input {
      width: 250px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      outline: none;
      font-size: 16px;
      background: #1e2f23;
      color: #a8ffb0;
    }

    input::placeholder {
      color: #6fbf73;
    }

    input:focus {
      box-shadow: 0 0 10px #2ecc71;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="id-edit" id="idLabel">#userInput</div>
    <input id="superManInput" type="text" placeholder="Type..." />
  </div>

  <script>
    const input = document.querySelector("input");
    const label = document.getElementById("idLabel");

    // Load saved ID
    const savedId = localStorage.getItem("inputId");
    if (savedId) {
      input.id = savedId;
      label.textContent = "#" + savedId;
    }

    // Click label to change ID
    label.addEventListener("click", () => {
      const newId = prompt("Enter new ID:", input.id);
      if (newId && newId.trim() !== "") {
        input.id = newId;
        label.textContent = "#" + newId;
        localStorage.setItem("inputId", newId);
      }
    });
  </script>
</body>
</html>
