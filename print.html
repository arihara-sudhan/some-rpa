<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Print Page</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
    }

    .lyrics {
      font-size: 1.2rem;
      margin-bottom: 24px;
      opacity: 0.85;
      letter-spacing: 2px;
      animation: pulse 1.2s infinite;
    }

    button {
      padding: 18px 42px;
      font-size: 1.2rem;
      border: none;
      border-radius: 12px;
      background: white;
      color: black;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease;
    }

    button:hover {
      transform: scale(1.05);
      background: #ddd;
    }

    @keyframes pulse {
      0% { opacity: 0.4; }
      50% { opacity: 1; }
      100% { opacity: 0.4; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="lyrics">
      print print print print is the word
    </div>

    <button onclick="window.print()">
      PRINT
    </button>
  </div>

</body>
</html>
